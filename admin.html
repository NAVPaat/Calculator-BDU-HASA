<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0f14;
            --surface: #151821;
            --surface2: #1c2030;
            --border: #252b3b;
            --border-light: #2e3750;
            --text: #e2e8f5;
            --text-muted: #6b7a99;
            --text-dim: #3d4a66;
            --blue: #3b82f6;
            --blue-dim: #1d3a6e;
            --purple: #a855f7;
            --purple-dim: #3b1d6e;
            --green: #10b981;
            --green-dim: #0d3d2c;
            --rose: #f43f5e;
            --rose-dim: #4a0f1e;
            --amber: #f59e0b;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Sora', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Subtle grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        /* Ambient glow */
        body::after {
            content: '';
            position: fixed;
            top: -20%;
            left: -10%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(59,130,246,0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* NAV */
        nav {
            background: rgba(13,15,20,0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .nav-inner {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 2rem;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--blue) 0%, #6366f1 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .nav-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: 0.01em;
        }

        .nav-sub {
            font-size: 0.65rem;
            font-weight: 500;
            color: var(--text-muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-family: 'JetBrains Mono', monospace;
        }

        .nav-badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--text-muted);
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 4px 12px;
        }

        /* SECTION CARDS */
        .section-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            z-index: 1;
            transition: border-color 0.2s;
        }
        .section-card:hover { border-color: var(--border-light); }

        .section-header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .section-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .section-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
        }

        .section-desc {
            font-size: 0.72rem;
            color: var(--text-muted);
            margin-top: 1px;
            font-family: 'JetBrains Mono', monospace;
        }

        .section-body { padding: 1.5rem 2rem; }

        /* DROPDOWN ZONE */
        .select-zone {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.75rem 1rem;
            margin-bottom: 1.5rem;
        }

        .select-zone label {
            display: block;
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 6px;
            font-family: 'JetBrains Mono', monospace;
        }

        /* INPUTS */
        .form-grid {
            display: grid;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-bottom: 6px;
            color: var(--text-muted);
        }

        .inp {
            width: 100%;
            padding: 0.7rem 0.9rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 0.875rem;
            font-family: 'Sora', sans-serif;
            font-weight: 500;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        .inp:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
        }

        .inp-green:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(16,185,129,0.12); }
        .inp-rose:focus { border-color: var(--rose); box-shadow: 0 0 0 3px rgba(244,63,94,0.12); }

        .inp::placeholder { color: var(--text-dim); }

        select.inp {
            appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7a99' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 0.75rem center;
            background-repeat: no-repeat;
            background-size: 1.1em;
            padding-right: 2.25rem;
            cursor: pointer;
        }

        .inp-price-staf { color: #34d399; }
        .inp-price-luar { color: #fb7185; }

        /* PRICE LABELS */
        .label-staf { color: #34d399 !important; }
        .label-luar { color: #fb7185 !important; }

        /* ACTION BAR */
        .action-bar {
            border-top: 1px solid var(--border);
            padding-top: 1.25rem;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 8px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 0.6rem 1.1rem;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            font-family: 'Sora', sans-serif;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.15s;
            letter-spacing: 0.01em;
        }

        .btn:active { transform: scale(0.96); }

        .btn-primary-blue {
            background: var(--blue);
            color: #fff;
            box-shadow: 0 2px 12px rgba(59,130,246,0.25);
        }
        .btn-primary-blue:hover { background: #2563eb; }

        .btn-primary-purple {
            background: var(--purple);
            color: #fff;
            box-shadow: 0 2px 12px rgba(168,85,247,0.25);
        }
        .btn-primary-purple:hover { background: #9333ea; }

        .btn-primary-green {
            background: var(--green);
            color: #fff;
            box-shadow: 0 2px 12px rgba(16,185,129,0.25);
        }
        .btn-primary-green:hover { background: #059669; }

        .btn-ghost {
            background: transparent;
            color: var(--text-muted);
            border-color: var(--border-light);
        }
        .btn-ghost:hover { background: var(--surface2); color: var(--text); }

        .btn-danger {
            background: transparent;
            color: var(--rose);
            border-color: rgba(244,63,94,0.25);
        }
        .btn-danger:hover { background: rgba(244,63,94,0.08); }

        /* ACCENT STRIPE */
        .stripe-blue { border-top: 2px solid var(--blue); }
        .stripe-purple { border-top: 2px solid var(--purple); }
        .stripe-green { border-top: 2px solid var(--green); }

        .icon-bg-blue { background: rgba(59,130,246,0.12); }
        .icon-bg-purple { background: rgba(168,85,247,0.12); }
        .icon-bg-green { background: rgba(16,185,129,0.12); }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

        /* Grid helpers */
        .g2 { grid-template-columns: 1fr 1fr; }
        .g3 { grid-template-columns: 1fr 1fr 1fr; }
        .g4 { grid-template-columns: 1fr 1fr 1fr 1fr; }
        .g6 { grid-template-columns: repeat(6, 1fr); }

        .span2 { grid-column: span 2; }
        .span3 { grid-column: span 3; }
        .span4 { grid-column: span 4; }

        @media (max-width: 768px) {
            .g2, .g3, .g4, .g6 { grid-template-columns: 1fr; }
            .span2, .span3, .span4 { grid-column: span 1; }
            .section-header, .section-body { padding: 1.25rem; }
        }
    </style>
</head>
<body>

    <!-- NAV -->
    <nav>
        <div class="nav-inner">
            <div class="nav-brand">
                <div class="nav-icon">
                    <svg width="18" height="18" fill="none" stroke="white" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                </div>
                <div>
                    <div class="nav-title">Admin Page</div>
                    <div class="nav-sub">Pengurusan Database Berpusat</div>
                </div>
            </div>
            <div id="statusAdmin" class="nav-badge">⏳ Memuatkan...</div>
        </div>
    </nav>

    <!-- MAIN -->
    <main style="max-width:1100px; margin:0 auto; padding:2rem 1.5rem 4rem; position:relative; z-index:1; display:flex; flex-direction:column; gap:1.5rem;">

        <!-- SECTION: SEWAAN RUANG -->
        <div class="section-card stripe-blue">
            <div class="section-header">
                <div class="section-icon icon-bg-blue">🏢</div>
                <div>
                    <div class="section-title">Sewaan Ruang</div>
                    <div class="section-desc">Urus slot, hari, dan kadar harga ruang</div>
                </div>
            </div>
            <div class="section-body">
                <div class="select-zone">
                    <label style="color: var(--blue);">Pilih Rekod untuk Edit / Padam</label>
                    <select id="ruangDropdown" class="inp" onchange="pilihRuang()"></select>
                </div>

                <div class="form-grid g6">
                    <div class="form-group span2">
                        <label>Nama Tempat</label>
                        <input type="text" id="ruangKategori" class="inp" placeholder="Cth: Dewan Gemilang">
                    </div>
                    <div class="form-group span2">
                        <label>Kategori Hari</label>
                        <input type="text" id="ruangHari" class="inp" placeholder="Cth: Hari Bekerja">
                    </div>
                    <div class="form-group span2">
                        <label>Nama Slot</label>
                        <input type="text" id="ruangSlot" class="inp" placeholder="Cth: 8am - 1pm">
                    </div>
                    <div class="form-group span2">
                        <label>Kiraan Unit</label>
                        <select id="ruangUnit" class="inp">
                            <option value="Tiada">Tiada (Harga Tetap)</option>
                            <option value="Per Slot / Hari">Per Slot / Hari</option>
                            <option value="Per Jam">Per Jam</option>
                        </select>
                    </div>
                    <div class="form-group span2">
                        <label class="label-staf">Harga Staf (RM)</label>
                        <input type="number" id="ruangHargaStaf" class="inp inp-green inp-price-staf" placeholder="0.00">
                    </div>
                    <div class="form-group span2">
                        <label class="label-luar">Harga Luar (RM)</label>
                        <input type="number" id="ruangHargaLuar" class="inp inp-rose inp-price-luar" placeholder="0.00">
                    </div>
                </div>

                <div class="action-bar">
                    <button id="btnBatalRuang" onclick="resetFormRuang()" class="btn btn-ghost hidden">Batal</button>
                    <button id="btnPadamRuang" onclick="padamRuang()" class="btn btn-danger hidden">🗑 Padam</button>
                    <button id="btnSimpanRuang" onclick="simpanRuang()" class="btn btn-primary-blue">✦ Tambah Baru</button>
                </div>
            </div>
        </div>

        <!-- SECTION: PERALATAN -->
        <div class="section-card stripe-purple">
            <div class="section-header">
                <div class="section-icon icon-bg-purple">🪑</div>
                <div>
                    <div class="section-title">Peralatan</div>
                    <div class="section-desc">Urus kategori dan kadar harga peralatan</div>
                </div>
            </div>
            <div class="section-body">
                <div class="select-zone">
                    <label style="color: var(--purple);">Pilih Rekod untuk Edit / Padam</label>
                    <select id="alatDropdown" class="inp" onchange="pilihPeralatan()"></select>
                </div>

                <div class="form-grid g4">
                    <div class="form-group span2">
                        <label>Kategori Utama</label>
                        <input type="text" id="alatKategori" class="inp" placeholder="Cth: Meja / Kerusi">
                    </div>
                    <div class="form-group span2">
                        <label>Nama / Jenis</label>
                        <input type="text" id="alatNama" class="inp" placeholder="Cth: Meja Bulat VIP">
                    </div>
                    <div class="form-group span2">
                        <label class="label-staf">Harga Staf (RM)</label>
                        <input type="number" id="alatHargaStaf" class="inp inp-green inp-price-staf" placeholder="0.00">
                    </div>
                    <div class="form-group span2">
                        <label class="label-luar">Harga Luar (RM)</label>
                        <input type="number" id="alatHargaLuar" class="inp inp-rose inp-price-luar" placeholder="0.00">
                    </div>
                </div>

                <div class="action-bar">
                    <button id="btnBatalAlat" onclick="resetFormPeralatan()" class="btn btn-ghost hidden">Batal</button>
                    <button id="btnPadamAlat" onclick="padamPeralatan()" class="btn btn-danger hidden">🗑 Padam</button>
                    <button id="btnSimpanAlat" onclick="simpanPeralatan()" class="btn btn-primary-purple">✦ Tambah Baru</button>
                </div>
            </div>
        </div>

        <!-- SECTION: HONORIUM -->
        <div class="section-card stripe-green">
            <div class="section-header">
                <div class="section-icon icon-bg-green">🎤</div>
                <div>
                    <div class="section-title">Honorium Penceramah</div>
                    <div class="section-desc">Urus jawatan dan kadar honorium penceramah</div>
                </div>
            </div>
            <div class="section-body">
                <div class="select-zone">
                    <label style="color: var(--green);">Pilih Rekod untuk Edit / Padam</label>
                    <select id="honDropdown" class="inp" onchange="pilihHonorium()"></select>
                </div>

                <div class="form-grid g2">
                    <div class="form-group">
                        <label>Jawatan / Kategori Penceramah</label>
                        <input type="text" id="honNama" class="inp" placeholder="Cth: Penceramah G54">
                    </div>
                    <div class="form-group">
                        <label>Kadar Harga (RM)</label>
                        <input type="number" id="honHarga" class="inp" placeholder="0.00">
                    </div>
                </div>

                <div class="action-bar">
                    <button id="btnBatalHon" onclick="resetFormHonorium()" class="btn btn-ghost hidden">Batal</button>
                    <button id="btnPadamHon" onclick="padamHonorium()" class="btn btn-danger hidden">🗑 Padam</button>
                    <button id="btnSimpanHon" onclick="simpanHonorium()" class="btn btn-primary-green">✦ Tambah Baru</button>
                </div>
            </div>
        </div>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAfr_qvxigHbMn7pwOfVRImOkMb8FCS5wM", authDomain: "calculator-penganjuran-program.firebaseapp.com", projectId: "calculator-penganjuran-program", storageBucket: "calculator-penganjuran-program.firebasestorage.app", messagingSenderId: "270030809311", appId: "1:270030809311:web:5d82667274032231e2216a", measurementId: "G-ZBSY86RXF9" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app); const docRef = doc(db, "tetapan_sistem", "kalkulator");

        let adminData = { ruang: {}, peralatan: {}, honorium: [], susunanTempat: [] };
        const statusAdmin = document.getElementById('statusAdmin');
        let currentEditRuang = null; let currentEditAlat = null; let currentEditHon = null;

        async function initLoad() {
            try {
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    let d = docSnap.data();
                    adminData.peralatan = d.peralatan || {};
                    adminData.honorium = d.honorium || [];
                    adminData.ruang = (Array.isArray(d.ruang)) ? {} : (d.ruang || {});
                    adminData.susunanTempat = d.susunanTempat || [];
                }
                statusAdmin.textContent = '● Aktif';
                statusAdmin.style.color = '#34d399';
                renderUI();
            } catch (error) {
                statusAdmin.textContent = '● Ralat';
                statusAdmin.style.color = '#fb7185';
            }
        }

        async function simpanAutoKeFirebase() {
            statusAdmin.textContent = '↻ Menyimpan...';
            statusAdmin.style.color = '#f59e0b';
            try {
                await setDoc(docRef, adminData);
                setTimeout(() => {
                    statusAdmin.textContent = '✓ Tersimpan';
                    statusAdmin.style.color = '#34d399';
                }, 500);
            } catch (e) {
                statusAdmin.textContent = '✕ Gagal';
                statusAdmin.style.color = '#fb7185';
            }
        }

        window.renderUI = function() {
            let rHtml = '<option value="">+ Tambah Rekod Baru</option>';
            let senaraiTempat = adminData.susunanTempat || Object.keys(adminData.ruang);
            let tempatSah = senaraiTempat.filter(t => adminData.ruang[t]);
            Object.keys(adminData.ruang).forEach(t => { if(!tempatSah.includes(t)) tempatSah.push(t); });
            tempatSah.forEach(tempat => {
                if(!Array.isArray(adminData.ruang[tempat])) {
                    Object.keys(adminData.ruang[tempat]).forEach(hari => {
                        adminData.ruang[tempat][hari].forEach((slot, i) => {
                            let textUnit = (slot.unit && slot.unit !== 'Tiada') ? ` / ${slot.unit.replace('Per ', '')}` : '';
                            let hStaf = slot.hargaStaf !== undefined ? slot.hargaStaf : (slot.harga * 0.5 || 0);
                            let hLuar = slot.hargaLuar !== undefined ? slot.hargaLuar : (slot.harga || 0);
                            rHtml += `<option value="${tempat}|${hari}|${i}">[${tempat} - ${hari}] ${slot.namaSlot} (Staf: RM${hStaf}${textUnit}, Luar: RM${hLuar}${textUnit})</option>`;
                        });
                    });
                }
            });
            document.getElementById('ruangDropdown').innerHTML = rHtml;

            let aHtml = '<option value="">+ Tambah Rekod Baru</option>';
            Object.keys(adminData.peralatan).forEach(cat => {
                adminData.peralatan[cat].forEach((p, i) => {
                    let pStaf = p.hargaStaf !== undefined ? p.hargaStaf : (p.harga * 0.5 || 0);
                    let pLuar = p.hargaLuar !== undefined ? p.hargaLuar : (p.harga || 0);
                    aHtml += `<option value="${cat}|${i}">[${cat}] ${p.nama} (Staf: RM${pStaf}, Luar: RM${pLuar})</option>`;
                });
            });
            document.getElementById('alatDropdown').innerHTML = aHtml;

            let hHtml = '<option value="">+ Tambah Rekod Baru</option>';
            adminData.honorium.forEach((h, i) => { hHtml += `<option value="${i}">${h.nama} (RM ${h.harga})</option>`; });
            document.getElementById('honDropdown').innerHTML = hHtml;
        };

        // --- RUANG ---
        window.resetFormRuang = function() { document.getElementById('ruangDropdown').value = ""; pilihRuang(); };
        window.pilihRuang = function() {
            let val = document.getElementById('ruangDropdown').value; currentEditRuang = val ? val : null;
            const btnSimpan = document.getElementById('btnSimpanRuang'); const btnPadam = document.getElementById('btnPadamRuang'); const btnBatal = document.getElementById('btnBatalRuang');
            if(currentEditRuang) {
                let [tempat, hari, index] = val.split('|'); let slotData = adminData.ruang[tempat][hari][index];
                document.getElementById('ruangKategori').value = tempat; document.getElementById('ruangHari').value = hari;
                document.getElementById('ruangSlot').value = slotData.namaSlot; document.getElementById('ruangUnit').value = slotData.unit || 'Tiada';
                document.getElementById('ruangHargaStaf').value = slotData.hargaStaf !== undefined ? slotData.hargaStaf : (slotData.harga * 0.5 || 0);
                document.getElementById('ruangHargaLuar').value = slotData.hargaLuar !== undefined ? slotData.hargaLuar : (slotData.harga || 0);
                btnSimpan.innerHTML = "💾 Kemaskini Rekod"; btnPadam.classList.remove('hidden'); btnBatal.classList.remove('hidden');
            } else {
                document.getElementById('ruangKategori').value = ''; document.getElementById('ruangHari').value = ''; document.getElementById('ruangSlot').value = '';
                document.getElementById('ruangHargaStaf').value = ''; document.getElementById('ruangHargaLuar').value = ''; document.getElementById('ruangUnit').value = 'Tiada';
                btnSimpan.innerHTML = "✦ Tambah Baru"; btnPadam.classList.add('hidden'); btnBatal.classList.add('hidden');
            }
        };
        window.simpanRuang = function() {
            const tempat = document.getElementById('ruangKategori').value.trim(); const hari = document.getElementById('ruangHari').value.trim(); const slot = document.getElementById('ruangSlot').value.trim(); const unit = document.getElementById('ruangUnit').value;
            const hargaStaf = parseFloat(document.getElementById('ruangHargaStaf').value); const hargaLuar = parseFloat(document.getElementById('ruangHargaLuar').value);
            if(!tempat || !hari || !slot || isNaN(hargaStaf) || isNaN(hargaLuar)) { alert("Sila isi semua maklumat Ruang beserta Harga Staf & Luar."); return; }
            if(currentEditRuang) {
                let [oldTempat, oldHari, index] = currentEditRuang.split('|');
                adminData.ruang[oldTempat][oldHari].splice(index, 1);
                if(adminData.ruang[oldTempat][oldHari].length === 0) delete adminData.ruang[oldTempat][oldHari];
                if(Object.keys(adminData.ruang[oldTempat]).length === 0) delete adminData.ruang[oldTempat];
            }
            if(!adminData.ruang[tempat]) adminData.ruang[tempat] = {};
            if(!adminData.ruang[tempat][hari]) adminData.ruang[tempat][hari] = [];
            if(!adminData.susunanTempat) adminData.susunanTempat = [];
            if(!adminData.susunanTempat.includes(tempat)) adminData.susunanTempat.push(tempat);
            adminData.ruang[tempat][hari].push({ namaSlot: slot, unit: unit, hargaStaf: hargaStaf, hargaLuar: hargaLuar, harga: hargaLuar });
            simpanAutoKeFirebase(); renderUI(); resetFormRuang();
        };
        window.padamRuang = function() {
            if(currentEditRuang && confirm("Adakah anda pasti mahu memadam rekod ini?")) {
                let [tempat, hari, index] = currentEditRuang.split('|');
                adminData.ruang[tempat][hari].splice(index, 1);
                if(adminData.ruang[tempat][hari].length === 0) delete adminData.ruang[tempat][hari];
                if(Object.keys(adminData.ruang[tempat]).length === 0) {
                    delete adminData.ruang[tempat];
                    if(adminData.susunanTempat) { adminData.susunanTempat = adminData.susunanTempat.filter(t => t !== tempat); }
                }
                simpanAutoKeFirebase(); renderUI(); resetFormRuang();
            }
        };

        // --- PERALATAN ---
        window.resetFormPeralatan = function() { document.getElementById('alatDropdown').value = ""; pilihPeralatan(); };
        window.pilihPeralatan = function() {
            let val = document.getElementById('alatDropdown').value; currentEditAlat = val ? val : null;
            const btnSimpan = document.getElementById('btnSimpanAlat'); const btnPadam = document.getElementById('btnPadamAlat'); const btnBatal = document.getElementById('btnBatalAlat');
            if(currentEditAlat) {
                let [cat, index] = val.split('|'); let pData = adminData.peralatan[cat][index];
                document.getElementById('alatKategori').value = cat; document.getElementById('alatNama').value = pData.nama;
                document.getElementById('alatHargaStaf').value = pData.hargaStaf !== undefined ? pData.hargaStaf : (pData.harga * 0.5 || 0);
                document.getElementById('alatHargaLuar').value = pData.hargaLuar !== undefined ? pData.hargaLuar : (pData.harga || 0);
                btnSimpan.innerHTML = "💾 Kemaskini Rekod"; btnPadam.classList.remove('hidden'); btnBatal.classList.remove('hidden');
            } else {
                document.getElementById('alatKategori').value = ''; document.getElementById('alatNama').value = ''; document.getElementById('alatHargaStaf').value = ''; document.getElementById('alatHargaLuar').value = '';
                btnSimpan.innerHTML = "✦ Tambah Baru"; btnPadam.classList.add('hidden'); btnBatal.classList.add('hidden');
            }
        };
        window.simpanPeralatan = function() {
            const cat = document.getElementById('alatKategori').value.trim(); const nama = document.getElementById('alatNama').value.trim();
            const hargaStaf = parseFloat(document.getElementById('alatHargaStaf').value); const hargaLuar = parseFloat(document.getElementById('alatHargaLuar').value);
            if(!cat || !nama || isNaN(hargaStaf) || isNaN(hargaLuar)) { alert("Sila isi semua maklumat Peralatan beserta Harga Staf & Luar."); return; }
            if(currentEditAlat) {
                let [oldCat, index] = currentEditAlat.split('|');
                adminData.peralatan[oldCat].splice(index, 1);
                if(adminData.peralatan[oldCat].length === 0) delete adminData.peralatan[oldCat];
            }
            if(!adminData.peralatan[cat]) adminData.peralatan[cat] = [];
            adminData.peralatan[cat].push({ nama: nama, hargaStaf: hargaStaf, hargaLuar: hargaLuar, harga: hargaLuar });
            simpanAutoKeFirebase(); renderUI(); resetFormPeralatan();
        };
        window.padamPeralatan = function() {
            if(currentEditAlat && confirm("Adakah anda pasti mahu memadam rekod ini?")) {
                let [cat, index] = currentEditAlat.split('|');
                adminData.peralatan[cat].splice(index, 1);
                if(adminData.peralatan[cat].length === 0) delete adminData.peralatan[cat];
                simpanAutoKeFirebase(); renderUI(); resetFormPeralatan();
            }
        };

        // --- HONORIUM ---
        window.resetFormHonorium = function() { document.getElementById('honDropdown').value = ""; pilihHonorium(); };
        window.pilihHonorium = function() {
            let val = document.getElementById('honDropdown').value; currentEditHon = val ? parseInt(val) : null;
            const btnSimpan = document.getElementById('btnSimpanHon'); const btnPadam = document.getElementById('btnPadamHon'); const btnBatal = document.getElementById('btnBatalHon');
            if(currentEditHon !== null) {
                document.getElementById('honNama').value = adminData.honorium[currentEditHon].nama; document.getElementById('honHarga').value = adminData.honorium[currentEditHon].harga;
                btnSimpan.innerHTML = "💾 Kemaskini Rekod"; btnPadam.classList.remove('hidden'); btnBatal.classList.remove('hidden');
            } else {
                document.getElementById('honNama').value = ''; document.getElementById('honHarga').value = '';
                btnSimpan.innerHTML = "✦ Tambah Baru"; btnPadam.classList.add('hidden'); btnBatal.classList.add('hidden');
            }
        };
        window.simpanHonorium = function() {
            const nama = document.getElementById('honNama').value.trim(); const harga = parseFloat(document.getElementById('honHarga').value);
            if(!nama || isNaN(harga)) { alert("Sila isi jawatan dan harga Honorium."); return; }
            if(currentEditHon !== null) { adminData.honorium[currentEditHon] = { nama, harga }; } else { adminData.honorium.push({ nama, harga }); }
            simpanAutoKeFirebase(); renderUI(); resetFormHonorium();
        };
        window.padamHonorium = function() {
            if(currentEditHon !== null && confirm("Adakah anda pasti mahu memadam rekod ini?")) {
                adminData.honorium.splice(currentEditHon, 1);
                simpanAutoKeFirebase(); renderUI(); resetFormHonorium();
            }
        };

        initLoad();
    </script>
</body>
</html>
